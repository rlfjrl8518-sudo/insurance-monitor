<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta charset="utf-8">
  <style>
    :root {
      --accent: #f0782a;
      --bg: #f3f4f6;
      --card-bg: #ffffff;
      --border: #e0e2e6;
      --text: #222;
      --text-light: #888;
    }
    * { box-sizing: border-box; }
    body {
      font-family: "Malgun Gothic", "Apple SD Gothic Neo", sans-serif;
      margin: 0;
      background: var(--bg);
      color: var(--text);
    }
    header {
      background: #fff;
      border-bottom: 1px solid var(--border);
      padding: 14px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 20;
    }
    header h1 {
      font-size: 18px;
      margin: 0;
    }
    header button {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 8px 14px;
      font-size: 13px;
      cursor: pointer;
    }

    /* 탭바 */
    #탭바 {
      background: #fff;
      border-bottom: 1px solid var(--border);
      padding: 0 20px;
      display: flex;
      gap: 4px;
      position: sticky;
      top: 53px;
      z-index: 19;
    }
    .탭버튼 {
      background: none;
      border: none;
      border-bottom: 3px solid transparent;
      padding: 10px 14px;
      font-size: 13px;
      cursor: pointer;
      color: var(--text-light);
    }
    .탭버튼.활성 {
      color: var(--text);
      border-bottom-color: var(--accent);
      font-weight: bold;
    }

    /* 분석 탭 */
    .차트그리드 {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
      padding: 16px 20px 40px;
    }
    .차트박스 {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px;
    }
    .차트박스-넓게 { grid-column: 1 / -1; }
    .차트박스헤더 {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 8px;
    }
    .차트박스헤더 h3 {
      margin: 0;
      font-size: 14px;
    }
    .차트다운로드버튼 {
      flex-shrink: 0;
      padding: 4px 10px;
      font-size: 12px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--card-bg);
      color: var(--text-light);
      cursor: pointer;
    }
    .차트다운로드버튼:hover { background: var(--border); }
    .차트 {
      width: 100%;
      height: 320px;
    }
    @media (max-width: 900px) {
      .차트그리드 { grid-template-columns: 1fr; }
    }
    #분석옵션 {
      padding: 12px 20px 0;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: var(--text-light);
    }
    #분석옵션 select {
      padding: 6px 8px;
      border: 1px solid var(--border);
      border-radius: 5px;
      font-size: 12px;
    }

    #필터바 {
      background: #fff;
      border-bottom: 1px solid var(--border);
      padding: 10px 20px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      position: sticky;
      top: 86px;
      z-index: 19;
    }
    #필터바 input, #필터바 select {
      padding: 6px 8px;
      border: 1px solid var(--border);
      border-radius: 5px;
      font-size: 12px;
    }
    #검색입력 { width: 220px; }
    #필터바 label {
      font-size: 12px;
      color: var(--text-light);
      display: flex;
      align-items: center;
      gap: 4px;
    }
    #필터바 .구분 {
      width: 1px;
      height: 22px;
      background: var(--border);
      margin: 0 2px;
    }
    #필터초기화버튼 {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 5px;
      padding: 6px 12px;
      font-size: 12px;
      cursor: pointer;
      color: var(--text-light);
    }

    /* 다중선택 드롭다운 */
    .다중선택 { position: relative; }
    .다중선택버튼 {
      padding: 6px 8px;
      border: 1px solid var(--border);
      border-radius: 5px;
      font-size: 12px;
      background: #fff;
      cursor: pointer;
      min-width: 110px;
      max-width: 200px;
      text-align: left;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .다중선택패널 {
      display: none;
      position: absolute;
      top: calc(100% + 4px);
      left: 0;
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 6px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.12);
      padding: 6px;
      z-index: 30;
      min-width: 160px;
      max-height: 240px;
      overflow-y: auto;
    }
    .다중선택패널.열림 { display: block; }
    .다중선택패널 label {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      padding: 4px 6px;
      cursor: pointer;
      white-space: nowrap;
      border-radius: 4px;
    }
    .다중선택패널 label:hover { background: var(--bg); }

    #결과정보 {
      padding: 10px 20px 0;
      font-size: 13px;
      color: var(--text-light);
    }

    #갤러리 { padding: 10px 20px 40px; }
    .광고주섹션 { margin-top: 18px; }
    .광고주섹션 h2 {
      font-size: 15px;
      margin: 0 0 10px;
      padding-bottom: 6px;
      border-bottom: 2px solid var(--accent);
      display: inline-block;
    }
    .카드그리드 {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 14px;
    }
    .카드 {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      cursor: pointer;
      transition: box-shadow 0.15s, transform 0.15s;
    }
    .카드:hover {
      box-shadow: 0 4px 14px rgba(0,0,0,0.1);
      transform: translateY(-2px);
    }
    .카드 .이미지영역 {
      width: 100%;
      aspect-ratio: 1 / 1;
      background: #f0f0f0;
      overflow: hidden;
    }
    .카드 .이미지영역 img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .카드 .이미지영역.플레이스홀더 {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      color: var(--text-light);
    }
    .카드 .이미지영역.플레이스홀더 .아이콘 { font-size: 28px; }
    .카드 .이미지영역.플레이스홀더 .텍스트 { font-size: 11px; }
    .카드 .정보 { padding: 10px; }
    .카드 .정보 .태그줄 {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      margin-bottom: 6px;
    }
    .태그 {
      display: inline-block;
      font-size: 11px;
      padding: 2px 7px;
      border-radius: 10px;
      background: #eef1f5;
      color: #555;
    }
    .태그.빈값 { color: #bbb; }
    .상태배지 {
      font-size: 11px;
      padding: 2px 7px;
      border-radius: 10px;
      font-weight: bold;
    }
    .상태배지.신규 { background: #e6f4ea; color: #1e8e3e; }
    .상태배지.운영중 { background: #e8f0fe; color: #1a73e8; }
    .상태배지.종료 { background: #f1f1f1; color: #999; }
    .카드 .하단줄 {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 12px;
      color: var(--text-light);
    }

    #빈결과 {
      text-align: center;
      color: var(--text-light);
      padding: 60px 0;
      font-size: 14px;
    }
    #로딩 {
      text-align: center;
      color: var(--text-light);
      padding: 60px 0;
      font-size: 14px;
    }

    /* 모달 공통 */
    .모달 {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.45);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }
    .모달.열림 { display: flex; }
    .모달내용 {
      background: #fff;
      border-radius: 10px;
      max-width: 720px;
      width: 92%;
      max-height: 88vh;
      overflow-y: auto;
      padding: 24px;
      position: relative;
    }
    .닫기버튼 {
      position: absolute;
      top: 12px; right: 14px;
      border: none;
      background: none;
      font-size: 22px;
      cursor: pointer;
      color: #999;
      line-height: 1;
    }

    /* 상세 팝업 */
    #상세팝업 .모달내용 { display: flex; gap: 20px; flex-wrap: wrap; }
    #상세이미지래퍼 { flex: 1 1 260px; }
    #상세이미지 { width: 100%; border-radius: 8px; border: 1px solid var(--border); }
    .이미지플레이스홀더 {
      width: 100%;
      aspect-ratio: 1 / 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      color: var(--text-light);
      background: #f0f0f0;
      border-radius: 8px;
      border: 1px solid var(--border);
    }
    .이미지플레이스홀더 .아이콘 { font-size: 36px; }
    .이미지플레이스홀더 .텍스트 { font-size: 12px; }
    #상세정보 { flex: 1 1 320px; min-width: 280px; }
    #상세정보 h2 { margin: 0 0 6px; font-size: 17px; }
    #상세정보 .상태운영 { font-size: 12px; color: var(--text-light); margin-bottom: 12px; }
    .필드그룹 { margin-bottom: 12px; }
    .필드그룹 label {
      display: block;
      font-size: 12px;
      color: var(--text-light);
      margin-bottom: 4px;
    }
    .필드그룹 select, .필드그룹 textarea {
      width: 100%;
      padding: 6px 8px;
      border: 1px solid var(--border);
      border-radius: 5px;
      font-size: 13px;
      font-family: inherit;
    }
    .필드그룹 textarea { resize: vertical; min-height: 50px; }
    .필드그룹 .읽기전용 {
      font-size: 13px;
      padding: 6px 0;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .분류행 { display: flex; gap: 10px; }
    .분류행 .필드그룹 { flex: 1; }
    #저장버튼 {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 9px 18px;
      font-size: 13px;
      cursor: pointer;
      margin-top: 6px;
    }
    #원본보기버튼 {
      background: #fff;
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 9px 18px;
      font-size: 13px;
      cursor: pointer;
      margin-top: 6px;
      margin-left: 6px;
    }
    #원본보기버튼[disabled] { color: var(--text-light); cursor: not-allowed; }
    #저장상태 { font-size: 12px; margin-left: 10px; color: #1e8e3e; }

    /* 설정 팝업 */
    #설정팝업 h2 { margin-top: 0; font-size: 17px; }
    #설정팝업 h3 { font-size: 14px; margin: 18px 0 8px; }
    #설정팝업 .설정그리드 {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 14px;
      margin-bottom: 16px;
    }
    #설정팝업 .필드그룹 textarea { min-height: 140px; }
    #설정팝업 .안내 {
      font-size: 12px;
      color: var(--text-light);
      margin-bottom: 14px;
    }
    #카테고리설정목록 {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 14px;
      margin-bottom: 10px;
    }
    .카테고리블록 { display: flex; flex-direction: column; }
    .카테고리블록헤더 {
      display: flex;
      gap: 6px;
      margin-bottom: 4px;
    }
    .카테고리이름입력 {
      flex: 1;
      font-weight: bold;
      border: 1px solid var(--border);
      border-radius: 5px;
      padding: 4px 6px;
      font-size: 13px;
    }
    .카테고리삭제버튼 {
      border: 1px solid var(--border);
      background: #fff;
      border-radius: 5px;
      padding: 4px 8px;
      font-size: 12px;
      cursor: pointer;
      color: #d93025;
    }
    .카테고리블록 textarea {
      min-height: 100px;
      padding: 6px 8px;
      border: 1px solid var(--border);
      border-radius: 5px;
      font-size: 13px;
      font-family: inherit;
      resize: vertical;
    }
    .카테고리추가행 {
      display: flex;
      gap: 6px;
      margin-bottom: 16px;
    }
    .카테고리추가행 input {
      flex: 1;
      padding: 6px 8px;
      border: 1px solid var(--border);
      border-radius: 5px;
      font-size: 13px;
    }
    .카테고리추가행 button {
      border: 1px solid var(--border);
      background: #fff;
      border-radius: 5px;
      padding: 6px 12px;
      font-size: 12px;
      cursor: pointer;
    }
    #설정저장버튼 {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 9px 18px;
      font-size: 13px;
      cursor: pointer;
    }
    #설정저장상태 { font-size: 12px; margin-left: 10px; color: #1e8e3e; }

    /* 수집 실행 버튼 */
    #수집버튼 {
      background: #fff;
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 8px 14px;
      font-size: 13px;
      cursor: pointer;
      margin-right: 8px;
    }
  </style>
</head>
<body>
  <header>
    <h1>한화손해보험 경쟁사 광고 모니터링</h1>
    <div>
      <button id="수집버튼" onclick="수집실행()">▶ 지금 수집하기</button>
      <button onclick="설정열기()">⚙ 설정</button>
    </div>
  </header>

  <div id="탭바">
    <button class="탭버튼 활성" data-탭="갤러리탭" onclick="탭전환('갤러리탭')">갤러리</button>
    <button class="탭버튼" data-탭="분석탭" onclick="탭전환('분석탭')">분석</button>
  </div>

  <div id="갤러리탭">
  <div id="필터바">
    <input type="text" id="검색입력" placeholder="광고 텍스트 / 광고주 검색" oninput="필터적용()">

    <span class="구분"></span>

    <div class="다중선택" id="카테고리필터래퍼">
      <button type="button" class="다중선택버튼" onclick="다중선택토글('카테고리')">카테고리: 전체</button>
      <div class="다중선택패널" id="카테고리필터패널"></div>
    </div>
    <div class="다중선택" id="광고주필터래퍼">
      <button type="button" class="다중선택버튼" onclick="다중선택토글('광고주')">광고주: 전체</button>
      <div class="다중선택패널" id="광고주필터패널"></div>
    </div>
    <div class="다중선택" id="소재유형필터래퍼">
      <button type="button" class="다중선택버튼" onclick="다중선택토글('소재유형')">소재유형: 전체</button>
      <div class="다중선택패널" id="소재유형필터패널"></div>
    </div>
    <div class="다중선택" id="보종필터래퍼">
      <button type="button" class="다중선택버튼" onclick="다중선택토글('보종')">보종: 전체</button>
      <div class="다중선택패널" id="보종필터패널"></div>
    </div>
    <div class="다중선택" id="후킹필터래퍼">
      <button type="button" class="다중선택버튼" onclick="다중선택토글('후킹')">후킹: 전체</button>
      <div class="다중선택패널" id="후킹필터패널"></div>
    </div>

    <span class="구분"></span>

    <select id="구분필터" onchange="필터적용()">
      <option value="전체">구분: 전체</option>
      <option value="자사">자사</option>
      <option value="경쟁사">경쟁사</option>
    </select>

    <select id="상태필터" onchange="필터적용()">
      <option value="전체">상태: 전체</option>
      <option value="신규">신규만</option>
      <option value="운영중">운영중만</option>
      <option value="종료">종료만</option>
    </select>

    <select id="운영일수필터" onchange="필터적용()">
      <option value="0">운영일수: 전체</option>
      <option value="7">7일 이상</option>
      <option value="30">30일 이상</option>
      <option value="60">60일 이상</option>
    </select>

    <span class="구분"></span>

    <label>시작일
      <input type="date" id="시작일_부터" onchange="필터적용()">
      ~
      <input type="date" id="시작일_까지" onchange="필터적용()">
    </label>
    <label>종료일
      <input type="date" id="종료일_부터" onchange="필터적용()">
      ~
      <input type="date" id="종료일_까지" onchange="필터적용()">
    </label>

    <button id="필터초기화버튼" onclick="필터초기화()">필터 초기화</button>
  </div>

  <div id="결과정보"></div>
  <div id="로딩">불러오는 중...</div>
  <div id="갤러리"></div>
  </div>

  <!-- 분석 탭 -->
  <div id="분석탭" style="display:none">
    <div id="분석옵션">
      <label for="분석기준">비교 기준</label>
      <select id="분석기준" onchange="분석렌더링()">
        <option value="광고주">광고주별</option>
        <option value="카테고리">카테고리별</option>
      </select>

      <label for="분석카테고리필터">카테고리</label>
      <select id="분석카테고리필터" onchange="분석카테고리변경()">
        <option value="전체">전체</option>
      </select>

  <script src="https://www.gstatic.com/charts/loader.js"></script>
  <script>
    var 전체데이터 = [];
    var 설정값 = { 카테고리: {}, 소재유형: [], 보종: [], 후킹: [] };
    var 선택된ad_id = null;
    var 다중선택상태 = { 카테고리: [], 광고주: [], 소재유형: [], 보종: [], 후킹: [] };
    var 다중선택기본텍스트 = { 카테고리: "카테고리", 광고주: "광고주", 소재유형: "소재유형", 보종: "보종", 후킹: "후킹" };
    var 현재탭 = "갤러리탭";
    var 차트로드완료 = false;
    var 분석필터데이터 = [];
    var 차트데이터 = {};

    // 설정값.카테고리에 등록된 모든 광고주를 카테고리 등장 순서대로 합친 목록을 반환한다.
    function 전체광고주목록() {
      var 목록 = [];
      Object.keys(설정값.카테고리 || {}).forEach(function (카테고리) {
        (설정값.카테고리[카테고리] || []).forEach(function (광고주) {
          if (목록.indexOf(광고주) === -1) 목록.push(광고주);
        });
      });
      return 목록;
    }

    // 광고주명 -> 카테고리명 매핑을 반환한다.
    function 광고주카테고리맵() {
      var 맵 = {};
      Object.keys(설정값.카테고리 || {}).forEach(function (카테고리) {
        (설정값.카테고리[카테고리] || []).forEach(function (광고주) {
          맵[광고주] = 카테고리;
        });
      });
      return 맵;
    }

    // 자사(구분=자사) 광고주명을 데이터에서 추출한다.
    function 자사광고주목록() {
      var 목록 = [];
      전체데이터.forEach(function (행) {
        if (행.구분 === "자사" && 목록.indexOf(행.광고주) === -1) 목록.push(행.광고주);
      });
      return 목록;
    }

    // 광고주 필터 옵션: 자사 광고주 + 카테고리에 등록된 경쟁사 광고주
    function 광고주옵션목록() {
      var 목록 = 자사광고주목록();
      전체광고주목록().forEach(function (광고주) {
        if (목록.indexOf(광고주) === -1) 목록.push(광고주);
      });
      return 목록;
    }

    // 갤러리/분석에서 사용할 광고주 표시 순서: 자사 먼저, 그 다음 카테고리 등록 순서대로.
    function 정렬순서계산() {
      return 광고주옵션목록();
    }

    google.charts.load("current", { packages: ["corechart"] });
    google.charts.setOnLoadCallback(function () {
      차트로드완료 = true;
      if (현재탭 === "분석탭") 분석렌더링();
    });

    function 초기화() {
      google.script.run.withSuccessHandler(function (설정) {
        설정값 = 설정;
        필터옵션채우기();
        분석옵션채우기();
      }).설정값_가져오기();

      google.script.run.withSuccessHandler(function (데이터) {
        전체데이터 = 데이터;
        document.getElementById("로딩").style.display = "none";
        필터옵션채우기();
        분석옵션채우기();
        필터적용();
        if (현재탭 === "분석탭") 분석렌더링();
      }).광고데이터_가져오기();
    }

    // 전체데이터에 실제로 등장하는 값의 집합을 필드명별로 계산한다.
    // 카테고리필터가 주어지면, 광고주/소재유형/보종/후킹은 해당 카테고리에 속한 행만 기준으로 계산한다.
    // (카테고리 자체의 존재값은 항상 전체 데이터 기준으로 계산해 선택지가 줄어들지 않도록 한다.)
    function 존재값집합(카테고리필터) {
      var 카테고리맵 = 광고주카테고리맵();
      var 결과 = { 카테고리: {}, 광고주: {}, 소재유형: {}, 보종: {}, 후킹: {} };
      전체데이터.forEach(function (행) {
        var 행카테고리 = 카테고리맵[행.광고주];
        if (행카테고리) 결과.카테고리[행카테고리] = true;

        if (카테고리필터 && 카테고리필터.length && 카테고리필터.indexOf(행카테고리) === -1) return;

        if (행.광고주) 결과.광고주[행.광고주] = true;
        if (행.소재유형) 결과.소재유형[행.소재유형] = true;
        if (행.보종) 결과.보종[행.보종] = true;
        if (행.후킹) 결과.후킹[행.후킹] = true;
      });
      return 결과;
    }

    function 필터옵션채우기() {
      var 존재 = 존재값집합(다중선택상태.카테고리);
      var 옵션맵 = {
        카테고리: Object.keys(설정값.카테고리 || {}).filter(function (v) { return 존재.카테고리[v]; }),
        광고주: 광고주옵션목록().filter(function (v) { return 존재.광고주[v]; }),
        소재유형: (설정값.소재유형 || []).filter(function (v) { return 존재.소재유형[v]; }),
        보종: (설정값.보종 || []).filter(function (v) { return 존재.보종[v]; }),
        후킹: (설정값.후킹 || []).filter(function (v) { return 존재.후킹[v]; }),
      };

      Object.keys(옵션맵).forEach(function (키) {
        // 설정 목록에서 사라졌거나 더 이상 데이터에 존재하지 않는 값은 선택 상태에서도 제거
        다중선택상태[키] = 다중선택상태[키].filter(function (값) {
          return (옵션맵[키] || []).indexOf(값) !== -1;
        });
        다중선택패널채우기(키, 옵션맵[키]);
        다중선택버튼갱신(키);
      });
    }

    function 다중선택패널채우기(키, 목록) {
      var 패널 = document.getElementById(키 + "필터패널");
      패널.innerHTML = "";

      // "전체" 옵션: 선택된 항목이 없을 때를 의미하며, 체크 시 다른 선택을 모두 해제한다.
      var 전체label = document.createElement("label");
      var 전체체크 = document.createElement("input");
      전체체크.type = "checkbox";
      전체체크.checked = 다중선택상태[키].length === 0;
      전체체크.onchange = function () {
        if (전체체크.checked) {
          다중선택상태[키] = [];
          if (키 === "카테고리") {
            필터옵션채우기();
          } else {
            다중선택패널채우기(키, 목록);
            다중선택버튼갱신(키);
          }
          필터적용();
        } else {
          전체체크.checked = true;
        }
      };
      전체label.appendChild(전체체크);
      전체label.appendChild(document.createTextNode("전체"));
      패널.appendChild(전체label);

      (목록 || []).forEach(function (값) {
        var label = document.createElement("label");
        var 체크 = document.createElement("input");
        체크.type = "checkbox";
        체크.value = 값;
        체크.checked = 다중선택상태[키].indexOf(값) !== -1;
        체크.onchange = function () {
          var idx = 다중선택상태[키].indexOf(값);
          if (체크.checked) {
            if (idx === -1) 다중선택상태[키].push(값);
          } else if (idx !== -1) {
            다중선택상태[키].splice(idx, 1);
          }
          if (키 === "카테고리") {
            필터옵션채우기();
          } else {
            다중선택패널채우기(키, 목록);
            다중선택버튼갱신(키);
          }
          필터적용();
        };
        label.appendChild(체크);
        label.appendChild(document.createTextNode(값));
        패널.appendChild(label);
      });
    }

    function 다중선택버튼갱신(키) {
      var 버튼 = document.querySelector("#" + 키 + "필터래퍼 .다중선택버튼");
      var 선택 = 다중선택상태[키];
      var 기본텍스트 = 다중선택기본텍스트[키];

      if (선택.length === 0) {
        버튼.textContent = 기본텍스트 + ": 전체";
      } else if (선택.length === 1) {
        버튼.textContent = 기본텍스트 + ": " + 선택[0];
      } else {
        버튼.textContent = 기본텍스트 + ": " + 선택.length + "개 선택";
      }
    }

    function 다중선택토글(키) {
      var 패널 = document.getElementById(키 + "필터패널");
      var 열림 = 패널.classList.contains("열림");
      document.querySelectorAll(".다중선택패널").forEach(function (p) {
        p.classList.remove("열림");
      });
      if (!열림) 패널.classList.add("열림");
    }

    function 필터초기화() {
      document.getElementById("검색입력").value = "";
      Object.keys(다중선택상태).forEach(function (키) {
        다중선택상태[키] = [];
      });
      필터옵션채우기();
      document.getElementById("구분필터").value = "전체";
      document.getElementById("상태필터").value = "전체";
      document.getElementById("운영일수필터").value = "0";
      ["시작일_부터", "시작일_까지", "종료일_부터", "종료일_까지"].forEach(function (id) {
        document.getElementById(id).value = "";
      });
      필터적용();
    }

    function 필터적용() {
      var 검색어 = document.getElementById("검색입력").value.trim().toLowerCase();
      var 구분 = document.getElementById("구분필터").value;
      var 상태 = document.getElementById("상태필터").value;
      var 운영일수기준 = parseInt(document.getElementById("운영일수필터").value, 10) || 0;
      var 시작일_부터 = document.getElementById("시작일_부터").value;
      var 시작일_까지 = document.getElementById("시작일_까지").value;
      var 종료일_부터 = document.getElementById("종료일_부터").value;
      var 종료일_까지 = document.getElementById("종료일_까지").value;

      var 광고주카테고리 = 광고주카테고리맵();

      var 결과 = 전체데이터.filter(function (행) {
        if (다중선택상태.카테고리.length && 다중선택상태.카테고리.indexOf(광고주카테고리[행.광고주]) === -1) return false;
        if (다중선택상태.광고주.length && 다중선택상태.광고주.indexOf(행.광고주) === -1) return false;
        if (다중선택상태.소재유형.length && 다중선택상태.소재유형.indexOf(행.소재유형) === -1) return false;
        if (다중선택상태.보종.length && 다중선택상태.보종.indexOf(행.보종) === -1) return false;
        if (다중선택상태.후킹.length && 다중선택상태.후킹.indexOf(행.후킹) === -1) return false;
        if (구분 !== "전체" && 행.구분 !== 구분) return false;
        if (상태 !== "전체" && 행.상태 !== 상태) return false;
        if (운영일수기준 && Number(행.운영일수 || 0) < 운영일수기준) return false;

        if (시작일_부터 && (!행.광고시작일 || 행.광고시작일 < 시작일_부터)) return false;
        if (시작일_까지 && (!행.광고시작일 || 행.광고시작일 > 시작일_까지)) return false;
        if (종료일_부터 && (!행.광고종료일 || 행.광고종료일 < 종료일_부터)) return false;
        if (종료일_까지 && (!행.광고종료일 || 행.광고종료일 > 종료일_까지)) return false;

        if (검색어) {
          var 텍스트 = ((행.광고텍스트 || "") + " " + (행.광고주 || "")).toLowerCase();
          if (텍스트.indexOf(검색어) === -1) return false;
        }
        return true;
      });

      렌더링(결과);
    }

    function 렌더링(데이터) {
      var 갤러리 = document.getElementById("갤러리");
      var 결과정보 = document.getElementById("결과정보");
      갤러리.innerHTML = "";
      결과정보.textContent = "총 " + 데이터.length + "건";

      if (데이터.length === 0) {
        갤러리.innerHTML = '<div id="빈결과">조건에 맞는 광고가 없습니다.</div>';
        return;
      }

      var 그룹 = {};
      var 광고주순서 = [];

      데이터.forEach(function (행) {
        var 키 = 행.광고주 || "(광고주 미지정)";
        if (!그룹[키]) {
          그룹[키] = [];
          광고주순서.push(키);
        }
        그룹[키].push(행);
      });

      // 설정에 등록된 광고주 순서(자사 -> 카테고리 순)를 우선 적용하고, 그 외 값은 뒤에 붙인다.
      var 정렬순서 = 정렬순서계산().filter(function (이름) { return 그룹[이름]; });
      광고주순서.forEach(function (이름) {
        if (정렬순서.indexOf(이름) === -1) 정렬순서.push(이름);
      });

      정렬순서.forEach(function (광고주명) {
        var 섹션 = document.createElement("div");
        섹션.className = "광고주섹션";

        var 구분값 = 그룹[광고주명][0] && 그룹[광고주명][0].구분;
        var 제목 = document.createElement("h2");
        제목.textContent = 광고주명 + (구분값 === "자사" ? " (자사)" : "") + " (" + 그룹[광고주명].length + "건)";
        섹션.appendChild(제목);

        var 그리드 = document.createElement("div");
        그리드.className = "카드그리드";

        그룹[광고주명].forEach(function (행) {
          그리드.appendChild(카드만들기(행));
        });

        섹션.appendChild(그리드);
        갤러리.appendChild(섹션);
      });
    }

    function 카드만들기(행) {
      var 카드 = document.createElement("div");
      카드.className = "카드";
      카드.onclick = function () { 상세열기(행.ad_id); };

      var 태그줄 = document.createElement("div");

      [행.소재유형, 행.보종, 행.후킹].forEach(function (값) {
        var 태그 = document.createElement("span");
        태그.className = "태그" + (값 ? "" : " 빈값");
        태그.textContent = 값 || "미분류";
        태그줄.appendChild(태그);
      });
      정보.appendChild(태그줄);

      var 하단줄 = document.createElement("div");

      var 상태배지 = document.createElement("span");
      상태배지.className = "상태배지 " + (행.상태 || "");
      상태배지.textContent = 행.상태 || "-";
      하단줄.appendChild(상태배지);

      var 운영일수 = document.createElement("span");
      운영일수.textContent = "운영 " + (행.운영일수 || 0) + "일";
      하단줄.appendChild(운영일수);

      정보.appendChild(하단줄);
      카드.appendChild(정보);

      return 카드;

    function 상세열기(ad_id) {
      var 행 = 전체데이터.find(function (d) { return d.ad_id === ad_id; });
      if (!행) return;

      선택된ad_id = ad_id;

      var 상세이미지플레이스홀더 = document.getElementById("상세이미지플레이스홀더");

        상세이미지.src = 행.이미지URL;

        상세이미지플레이스홀더.style.display = "none";
      } else {
        상세이미지.src = "";
        상세이미지.style.display = "none";
        상세이미지플레이스홀더.style.display = "";

      document.getElementById("상세광고주").textContent = 행.광고주 || "";
      document.getElementById("상세상태운영").textContent =

      분류셀렉트채우기("상세소재유형", 설정값.소재유형, 행.소재유형);
      분류셀렉트채우기("상세보종", 설정값.보종, 행.보종);
      분류셀렉트채우기("상세후킹", 설정값.후킹, 행.후킹);

      document.getElementById("상세광고텍스트").textContent = 행.광고텍스트 || "(텍스트 없음)";
      document.getElementById("상세요약").textContent = 행.요약 || "(요약 없음)";
      document.getElementById("상세기간").textContent =
        "시작일: " + (행.광고시작일 || "-") + " / 종료일: " + (행.광고종료일 || "-") + " / 수집일: " + (행.수집일 || "-");

      var 원본보기버튼 = document.getElementById("원본보기버튼");
      원본보기버튼.disabled = !행.광고상세URL;

      document.getElementById("저장상태").textContent = "";
      팝업열기("상세팝업");
    }

    function 원본광고열기() {
      var 행 = 전체데이터.find(function (d) { return d.ad_id === 선택된ad_id; });
      if (!행 || !행.광고상세URL) return;

    }

    function 분류셀렉트채우기(엘리먼트id, 목록, 현재값) {
      var 셀렉트 = document.getElementById(엘리먼트id);
      셀렉트.innerHTML = "";

      var 미분류옵션 = document.createElement("option");

      미분류옵션.textContent = "(미분류)";
      셀렉트.appendChild(미분류옵션);

      var 전체목록 = (목록 || []).slice();
      if (현재값 && 전체목록.indexOf(현재값) === -1) {
        전체목록.push(현재값);
      }

      전체목록.forEach(function (값) {
        var 옵션 = document.createElement("option");

        옵션.textContent = 값;

    function 저장() {
      if (!선택된ad_id) return;

      var 소재유형 = document.getElementById("상세소재유형").value;
      var 보종 = document.getElementById("상세보종").value;
      var 후킹 = document.getElementById("상세후킹").value;

      var 저장버튼 = document.getElementById("저장버튼");
      var 저장상태 = document.getElementById("저장상태");
      저장버튼.disabled = true;
      저장상태.style.color = "#1e8e3e";
      저장상태.textContent = "저장 중...";

      google.script.run
        .withSuccessHandler(function (결과) {
          저장버튼.disabled = false;
          if (결과 && 결과.success) {
            저장상태.style.color = "#1e8e3e";
            저장상태.textContent = "저장되었습니다.";

            var 행 = 전체데이터.find(function (d) { return d.ad_id === 선택된ad_id; });
            if (행) {

              행.보종 = 보종;
              행.후킹 = 후킹;

            필터적용();
          } else {
            저장상태.style.color = "#d93025";
            저장상태.textContent = "저장 실패: " + (결과 && 결과.error ? 결과.error : "알 수 없는 오류");
          }
        })
        .withFailureHandler(function (오류) {
          저장버튼.disabled = false;
          저장상태.style.color = "#d93025";
          저장상태.textContent = "저장 실패: " + 오류.message;
        })
        .광고_수정(선택된ad_id, 소재유형, 보종, 후킹);

      document.getElementById("설정저장상태").textContent = "";

        .split("\n")
        .map(function (s) { return s.trim(); })
        .filter(function (s) { return s.length > 0; });

      var 카테고리 = {};
      document.querySelectorAll("#카테고리설정목록 .카테고리블록").forEach(function (블록) {

        var 광고주목록 = 블록.querySelector(".카테고리광고주입력").value

          .map(function (s) { return s.trim(); })
          .filter(function (s) { return s.length > 0; });
        카테고리[이름] = 광고주목록;
      });

      var 새설정 = {
        카테고리: 카테고리,

      };

      var 버튼 = document.getElementById("설정저장버튼");
      var 상태 = document.getElementById("설정저장상태");
      버튼.disabled = true;
      상태.style.color = "#1e8e3e";
      상태.textContent = "저장 중...";

      google.script.run
        .withSuccessHandler(function (결과) {
          버튼.disabled = false;
          if (결과 && 결과.success) {
            설정값 = 새설정;
            필터옵션채우기();
            분석옵션채우기();
            상태.style.color = "#1e8e3e";
            상태.textContent = "저장되었습니다.";
            필터적용();
            if (현재탭 === "분석탭") 분석렌더링();
          } else {
            상태.style.color = "#d93025";
            상태.textContent = "저장 실패: " + (결과 && 결과.error ? 결과.error : "알 수 없는 오류");
          }
        })
        .withFailureHandler(function (오류) {
          버튼.disabled = false;
          상태.style.color = "#d93025";
          상태.textContent = "저장 실패: " + 오류.message;
        })
        .설정_저장(새설정);

    function 탭전환(탭이름) {
      현재탭 = 탭이름;
      document.querySelectorAll(".탭버튼").forEach(function (b) {
        b.classList.toggle("활성", b.dataset.탭 === 탭이름);
      });
      document.getElementById("갤러리탭").style.display = 탭이름 === "갤러리탭" ? "" : "none";
      document.getElementById("분석탭").style.display = 탭이름 === "분석탭" ? "" : "none";
      if (탭이름 === "분석탭") 분석렌더링();
    }

    // 데이터를 그룹키 기준으로 묶고, 각 그룹 내에서 분류키별 건수를 집계한다.
    function 분류집계(데이터, 그룹키, 분류키) {
      var 결과 = {};
      데이터.forEach(function (행) {
        var 그룹값 = 행[그룹키] || "(미지정)";
        var 분류값 = 행[분류키] || "미분류";
        if (!결과[그룹값]) 결과[그룹값] = {};
        결과[그룹값][분류값] = (결과[그룹값][분류값] || 0) + 1;
      });
      return 결과;
    }

    // 데이터에 등장하는 그룹값을, 우선순위목록(설정값 순서)을 앞세워 정렬한다.
    function 그룹순서계산(데이터, 키, 우선순위목록) {
      var 존재 = {};
      데이터.forEach(function (행) {
        존재[행[키] || "(미지정)"] = true;
      });
      var 순서 = (우선순위목록 || []).filter(function (v) { return 존재[v]; });
      Object.keys(존재).forEach(function (v) {
        if (순서.indexOf(v) === -1) 순서.push(v);
      });
      return 순서;
    }

    // 분석 탭 비교 기준("광고주"/"카테고리")에 따라 각 행에 __분석그룹 필드를 채운다.
    function 분석그룹맵핑적용() {
      var 기준 = document.getElementById("분석기준").value;
      var 카테고리맵 = 광고주카테고리맵();
      전체데이터.forEach(function (행) {
        if (기준 === "카테고리") {
          행.__분석그룹 = 행.구분 === "자사" ? 행.광고주 : (카테고리맵[행.광고주] || "(미분류)");
        } else {
          행.__분석그룹 = 행.광고주;
        }
      });
      return 기준;
    }

    // 분석 탭 비교 기준에 따른 그룹 표시 순서(자사 -> 카테고리/광고주 등록 순)를 반환한다.
    function 분석그룹우선순위(기준) {
      var 자사목록 = 자사광고주목록();
      if (기준 === "카테고리") {
        return 자사목록.concat(Object.keys(설정값.카테고리 || {}));
      }
      return 정렬순서계산();
    }

    // 분석탭 "카테고리"/"광고주" 필터 선택지를 데이터에 실제 존재하는 값으로 채운다.
    function 분석옵션채우기() {
      var 존재 = 존재값집합();
      var 카테고리목록 = Object.keys(설정값.카테고리 || {}).filter(function (v) { return 존재.카테고리[v]; });

      var 카테고리셀렉트 = document.getElementById("분석카테고리필터");
      var 현재카테고리 = 카테고리셀렉트.value || "전체";
      카테고리셀렉트.innerHTML = '<option value="전체">전체</option>';
      카테고리목록.forEach(function (이름) {
        var 옵션 = document.createElement("option");
        옵션.value = 이름;
        옵션.textContent = 이름;
        카테고리셀렉트.appendChild(옵션);
      });
      카테고리셀렉트.value = 카테고리목록.indexOf(현재카테고리) !== -1 ? 현재카테고리 : "전체";

      분석광고주옵션채우기();
    }

    // 분석탭 카테고리 선택이 바뀌면, 광고주 선택지를 해당 카테고리 소속으로 다시 채운다.
    function 분석카테고리변경() {
      document.getElementById("분석광고주필터").value = "전체";
      분석광고주옵션채우기();
      분석렌더링();
    }

    function 분석광고주옵션채우기() {
      var 선택카테고리 = document.getElementById("분석카테고리필터").value;
      var 카테고리맵 = 광고주카테고리맵();
      var 존재 = 존재값집합();

      var 광고주목록 = 광고주옵션목록().filter(function (광고주) {
        if (!존재.광고주[광고주]) return false;
        if (선택카테고리 === "전체") return true;
        return 카테고리맵[광고주] === 선택카테고리;
      });

      var 광고주셀렉트 = document.getElementById("분석광고주필터");
      var 현재광고주 = 광고주셀렉트.value || "전체";
      광고주셀렉트.innerHTML = '<option value="전체">전체</option>';
      광고주목록.forEach(function (이름) {
        var 옵션 = document.createElement("option");
        옵션.value = 이름;
        옵션.textContent = 이름;
        광고주셀렉트.appendChild(옵션);
      });
      광고주셀렉트.value = 광고주목록.indexOf(현재광고주) !== -1 ? 현재광고주 : "전체";
    }

    // 분석탭 카테고리/광고주 필터를 적용한 데이터를 반환한다. 자사 데이터는 비교 기준이므로 항상 포함한다.
    function 분석데이터계산() {
      var 카테고리 = document.getElementById("분석카테고리필터").value;
      var 광고주 = document.getElementById("분석광고주필터").value;
      var 카테고리맵 = 광고주카테고리맵();

      return 전체데이터.filter(function (행) {
        if (행.구분 === "자사") return true;
        if (카테고리 !== "전체" && 카테고리맵[행.광고주] !== 카테고리) return false;
        if (광고주 !== "전체" && 행.광고주 !== 광고주) return false;
        return true;
      });
    }

    function 분석렌더링() {
      if (!차트로드완료 || !전체데이터.length) return;
      var 기준 = 분석그룹맵핑적용();
      분석필터데이터 = 분석데이터계산();
      var 기준라벨 = 기준 === "카테고리" ? "카테고리별" : "광고주별";
      ["차트2제목", "차트3제목", "차트4제목", "차트5제목"].forEach(function (id) {
        var el = document.getElementById(id);
        el.textContent = 기준라벨 + " " + el.textContent.replace(/^(광고주별|카테고리별) /, "");
      });
      차트_소재유형비교();
      차트_보종집중도();
      차트_후킹전략();
      차트_신규소재빈도();
      차트_장기운영현황();
      차트_월별추이();
    }

    // 1. 자사 vs 경쟁사 소재유형 비중 비교
    function 차트_소재유형비교() {
      var 소재유형목록 = (설정값.소재유형 || []).concat(["미분류"]);
      var 집계 = 분류집계(분석필터데이터, "구분", "소재유형");
      var 구분목록 = 그룹순서계산(분석필터데이터, "구분", ["자사", "경쟁사"]);

      var 헤더 = ["구분"].concat(소재유형목록);
      var 행들 = 구분목록.map(function (구분) {
        return [구분].concat(소재유형목록.map(function (분류) {
          return (집계[구분] && 집계[구분][분류]) || 0;
        }));
      });

      차트데이터.차트1 = { 헤더: 헤더, 행들: 행들 };

      var data = google.visualization.arrayToDataTable([헤더].concat(행들));
      var chart = new google.visualization.ColumnChart(document.getElementById("차트1"));
      chart.draw(data, {
        isStacked: "percent",
        legend: { position: "top" },
        chartArea: { width: "80%", height: "75%" },
      });
    }

    // 2. 보종 집중도 비교 (광고주별/카테고리별)
    function 차트_보종집중도() {
      var 기준 = document.getElementById("분석기준").value;
      var 보종목록 = (설정값.보종 || []).concat(["미분류"]);
      var 집계 = 분류집계(분석필터데이터, "__분석그룹", "보종");
      var 광고주목록 = 그룹순서계산(분석필터데이터, "__분석그룹", 분석그룹우선순위(기준));

      var 헤더 = ["광고주"].concat(보종목록);
      var 행들 = 광고주목록.map(function (광고주) {
        return [광고주].concat(보종목록.map(function (분류) {

        }));
      });

      차트데이터.차트2 = { 헤더: 헤더, 행들: 행들 };

      var data = google.visualization.arrayToDataTable([헤더].concat(행들));
      var chart = new google.visualization.ColumnChart(document.getElementById("차트2"));
      chart.draw(data, {
        isStacked: "percent",
        legend: { position: "top" },
        chartArea: { width: "80%", height: "70%" },
        hAxis: { slantedText: true, slantedTextAngle: 30 },
      });
    }

    // 3. 후킹 전략 비교 (광고주별/카테고리별)
    function 차트_후킹전략() {
      var 기준 = document.getElementById("분석기준").value;
      var 후킹목록 = (설정값.후킹 || []).concat(["미분류"]);
      var 집계 = 분류집계(분석필터데이터, "__분석그룹", "후킹");
      var 광고주목록 = 그룹순서계산(분석필터데이터, "__분석그룹", 분석그룹우선순위(기준));

      var 헤더 = ["광고주"].concat(후킹목록);

      차트데이터.차트3 = { 헤더: 헤더, 행들: 행들 };

      chart.draw(data, {

    // 4. 신규 소재 출시 빈도 (누적 소재 수, 광고주별/카테고리별)
    function 차트_신규소재빈도() {
      var 기준 = document.getElementById("분석기준").value;
      var 광고주목록 = 그룹순서계산(분석필터데이터, "__분석그룹", 분석그룹우선순위(기준));

      var 헤더 = ["광고주", "소재 수"];

        var 건수 = 분석필터데이터.filter(function (행) { return 행.__분석그룹 === 광고주; }).length;
        return [광고주, 건수];
      });

      차트데이터.차트4 = { 헤더: 헤더, 행들: 행들 };

      var data = google.visualization.arrayToDataTable([헤더].concat(행들));

    // 5. 장기 운영 소재 현황 (30일/60일/90일 이상, 광고주별/카테고리별)
    function 차트_장기운영현황() {
      var 기준 = document.getElementById("분석기준").value;
      var 광고주목록 = 그룹순서계산(분석필터데이터, "__분석그룹", 분석그룹우선순위(기준));

      var 헤더 = ["광고주", "30일 이상", "60일 이상", "90일 이상"];
      var 행들 = 광고주목록.map(function (광고주) {
        var 행데이터 = 분석필터데이터.filter(function (행) { return 행.__분석그룹 === 광고주; });
        var c30 = 행데이터.filter(function (행) { return Number(행.운영일수 || 0) >= 30; }).length;
        var c60 = 행데이터.filter(function (행) { return Number(행.운영일수 || 0) >= 60; }).length;
        var c90 = 행데이터.filter(function (행) { return Number(행.운영일수 || 0) >= 90; }).length;
        return [광고주, c30, c60, c90];
      });

      차트데이터.차트5 = { 헤더: 헤더, 행들: 행들 };

      var data = google.visualization.arrayToDataTable([헤더].concat(행들));
      var chart = new google.visualization.ColumnChart(document.getElementById("차트5"));
      chart.draw(data, {
        legend: { position: "top" },
        chartArea: { width: "80%", height: "70%" },
        hAxis: { slantedText: true, slantedTextAngle: 30 },
      });
    }

    // 6. 월별 신규/종료 소재 추이
    function 차트_월별추이() {
      var 월별 = {};

      분석필터데이터.forEach(function (행) {
        if (행.최초발견일) {
          var 신규월 = 행.최초발견일.slice(0, 7);
          월별[신규월] = 월별[신규월] || { 신규: 0, 종료: 0 };
          월별[신규월].신규 += 1;
        }
        if (행.광고종료일) {
          var 종료월 = 행.광고종료일.slice(0, 7);
          월별[종료월] = 월별[종료월] || { 신규: 0, 종료: 0 };
          월별[종료월].종료 += 1;
        }
      });

      var 월목록 = Object.keys(월별).sort();
      var 헤더 = ["월", "신규", "종료"];
      var 행들 = 월목록.map(function (월) {
        return [월, 월별[월].신규, 월별[월].종료];
      });

      차트데이터.차트6 = { 헤더: 헤더, 행들: 행들 };

      var data = google.visualization.arrayToDataTable([헤더].concat(행들.length ? 행들 : [["-", 0, 0]]));
      var chart = new google.visualization.LineChart(document.getElementById("차트6"));
      chart.draw(data, {
        legend: { position: "top" },
        chartArea: { width: "85%", height: "70%" },
        curveType: "function",
      });
    }

    // CSV 필드 값을 RFC 4180 규칙에 맞게 인용 처리한다.
    function CSV_필드(값) {
      var 문자열 = String(값 === undefined || 값 === null ? "" : 값);
      if (/[",\r\n]/.test(문자열)) {
        문자열 = '"' + 문자열.replace(/"/g, '""') + '"';
      }
      return 문자열;
    }

    // 분석탭 차트의 현재 데이터를 CSV 파일로 만들어 사용자 컴퓨터에 다운로드한다.
    function 차트결과다운로드(차트id) {
      var 데이터 = 차트데이터[차트id];
      if (!데이터 || !데이터.헤더) return;

      var 제목 = document.getElementById(차트id + "제목").textContent;
      var 안전제목 = 제목.replace(/\s+/g, "").replace(/[\\/:*?"<>|]/g, "");

      var 오늘 = new Date();
      var 날짜문자열 = 오늘.getFullYear() +
        String(오늘.getMonth() + 1).padStart(2, "0") +
        String(오늘.getDate()).padStart(2, "0");

      var 행목록 = [데이터.헤더].concat(데이터.행들);
      var csv = 행목록.map(function (행) {
        return 행.map(CSV_필드).join(",");
      }).join("\r\n");

      // 엑셀에서 한글이 깨지지 않도록 UTF-8 BOM을 붙인다.
      var BOM = String.fromCharCode(0xFEFF);
      var blob = new Blob([BOM + csv], { type: "text/csv;charset=utf-8;" });
      var url = URL.createObjectURL(blob);

      var a = document.createElement("a");
      a.href = url;
      a.download = "분석결과_" + 안전제목 + "_" + 날짜문자열 + ".csv";
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }

    초기화();
  </script>
