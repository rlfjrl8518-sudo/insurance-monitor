name: 경쟁사 광고 모니터링

on:
  schedule:
    - cron: "0 0 * * *" # 매일 09:00 KST (UTC 00:00)
    - cron: "0 9 * * *" # 매일 18:00 KST (UTC 09:00)
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 의존성 설치
        run: |
          pip install -r requirements.txt
          playwright install --with-deps chromium

      - name: 1단계 - 광고 수집
        run: python main.py | tee collect.log

      # Gemini API 키는 추후 발급 후 GEMINI_API_KEY 시크릿과 env를 추가하면 분류가 활성화됨.
      # 현재는 키 미설정 상태(config.json 플레이스홀더)로 두어, classify.py가 즉시 종료하도록 한다.
      - name: 2단계 - Gemini AI 분류
        run: python classify.py | tee classify.log

      - name: 3단계 - Google Sheets 동기화
        env:
          GOOGLE_SHEETS_ID: ${{ secrets.GOOGLE_SHEETS_ID }}
          GOOGLE_DRIVE_FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_FOLDER_ID }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          DRIVE_UPLOAD_WEBAPP_URL: ${{ secrets.DRIVE_UPLOAD_WEBAPP_URL }}
          DRIVE_UPLOAD_SECRET: ${{ secrets.DRIVE_UPLOAD_SECRET }}
        run: python sync_sheets.py | tee sync.log

      - name: 실행 로그 업로드
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: 실행로그-${{ github.run_number }}
          path: |
            collect.log
            classify.log
            sync.log
          retention-days: 30

      - name: 변경된 데이터 커밋
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ads.csv
          git diff --cached --quiet || git commit -m "데이터 갱신: $(TZ='Asia/Seoul' date +'%Y-%m-%d %H:%M %Z')"
          git push
